name: Reproducibility artifact upload

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.12"

      - name: Build deterministic archives
        run: python scripts/build_release_artifacts.py

      - name: Verify all artifacts
        run: shasum -a 256 -c SHA256SUMS

      - name: Upload paper and reproducibility bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: semilocal-reflected-packet-release-assets
          path: |
            paper/main.pdf
            dist/*.tar.gz
            dist/*-paper-*.pdf
            ZENODO_UPLOAD_SHA256SUMS
            SHA256SUMS
          if-no-files-found: error

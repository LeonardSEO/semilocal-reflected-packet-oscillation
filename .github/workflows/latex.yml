name: LaTeX compilation

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Compile paper
        uses: xu-cheng/latex-action@6549dc21effb2730855a1281407ecfcececc6c1b # 4.1.0
        with:
          root_file: main.tex
          working_directory: paper
          texlive_version: 2026

      - name: Require a nonempty PDF
        run: test -s paper/main.pdf

      - name: Upload compiled paper
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: semilocal-reflected-packet-paper
          path: paper/main.pdf
          if-no-files-found: error

name: Checksum verification

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.12"

      - name: Build release artifacts twice
        run: |
          python scripts/build_release_artifacts.py
          cp SHA256SUMS /tmp/SHA256SUMS.first
          python scripts/build_release_artifacts.py
          cmp /tmp/SHA256SUMS.first SHA256SUMS

      - name: Verify SHA-256 manifest
        run: shasum -a 256 -c SHA256SUMS

      - name: Require committed manifest to match
        run: git diff --exit-code -- SHA256SUMS
